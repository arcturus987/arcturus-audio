<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <link rel="icon" href="./assets/arcturus-audio-favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home</title>
  <link href="https://fonts.cdnfonts.com/css/google-sans" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Universal+Sans+%3A700"/>
  <link rel="stylesheet" href="./styles/home.css"/>
  <style>
  </style>
</head>
<body>
  <!-- Background -->
  <div class="home-background">

    <div class="content-container">

      <img class="home-logo-big" src="./assets/arcturus-audio-medium.png"/>

      <div class="motto-and-vector">
        <p class="motto-text">Elevating Silence to Serenades, Unleashing Sonic Aesthetics!</p>
        <img class="waves-vector" src="./assets/waves-vector.png"/>
      </div>

      <!-- Background Change Switch -->
      <div class="fixed-switch-container">
        <label class="switch">
          <input type="checkbox">
          <span class="slider round"></span>
        </label>
      </div>
      
    </div>

  </div>

  <!-- Navigation Bar -->
  <header class="navigation-bar">

    <div class="logo-and-text">
        <img class="nav-logo" src="./assets/arcturus-audio-medium.png"/>

        <navnorm class="nav">
          <ul class="nav-list-group">
              <li class="nav-list-item"><a href="index.html">Home</a></li>
              <li class="nav-list-item"><a href="services.html">Services</a></li>
              <li class="nav-list-item"><a href="contact.html">Contact</a></li>
          </ul>
      </navnorm>
    </div>

    <icon class="nav-icon-group">
      <a href="#" class="shopping-logo-link">
        <img class="shopping-logo" id="shopping-logo" src="./assets/shopping-logo.png" alt="Shopping Logo"/>
      </a>
    
      <a href="#" class="user-logo-link">
        <img class="user-logo" id="user-logo" src="./assets/user-logo.png" alt="User Logo"/>
      </a>
    </icon>

    <nav role="navigation">
      <div id="menuToggle">
        <input type="checkbox" />
        <svg viewBox="0 0 32 32">
          <path class="line line-top-bottom" d="M27 10 13 10C10.8 10 9 8.2 9 6 9 3.5 10.8 2 13 2 15.2 2 17 3.8 17 6L17 26C17 28.2 18.8 30 21 30 23.2 30 25 28.2 25 26 25 23.8 23.2 22 21 22L7 22"></path>
          <path class="line" d="M7 16 27 16"></path>
        </svg>
          <div class="menu-list" id="menu">
            <img class="nav-logo-black" src="./assets/arcturus-audio-medium-black.png"/>
            <div class="menu-item"><a class="link" href="index.html">Home</a></div>
            <div class="menu-item"><a class="link" href="services.html">Services</a></div>
            <div class="menu-item"><a class="link" href="contact.html">Contact</a></div>
            <div class="menu-item"><a class="link" href="#">Cart</a></div>
            <div class="menu-item"><a class="link" href="#">My Account</a></div>
          </div>
      </div>
    </nav>
      
  </header>

  <!-- Error Box -->
  <main class="error-container">
    <div class="text-paragraph">
      <h2 class="error-title">Under Maintenance</h2>
      <p class="error-text">We are still under maintenance. Please contact us for further inquiries.</p>

      <a href="contact.html" class="button contact-button">Contact</a>
      <button class="button close-button" id="error-close">Close</button>
    </div>
  </main>



  <!-- Bottom element to scroll to -->
  <div id="bottom"></div>

    <div class="arrow">
      <span></span>
    </div>

  <!-- Scroll To Bottom On Click -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var arrow = document.querySelector('.arrow');
      var bottomElement = document.getElementById('bottom');

      arrow.addEventListener('click', function () {
        bottomElement.scrollIntoView({ behavior: 'smooth' });
      });
    });
  </script>

  <!-- Background switcher -->
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var checkbox = document.querySelector('.fixed-switch-container input[type="checkbox"]');
      var homeBackground = document.querySelector('.home-background');
      
      checkbox.checked = false;
  
      checkbox.addEventListener('change', function () {
        if (checkbox.checked) {
          homeBackground.classList.add('dark-background');
        } else {
          homeBackground.classList.remove('dark-background');
        }
      });
    });
  </script>
  

  <!-- Logo transition -->
  <script>
    window.addEventListener('scroll', () => {
      const homeLogo = document.querySelector('.home-logo-big');
      const navLogo = document.querySelector('.nav-logo');
      const scrollThreshold = 150; // Adjust this value as needed

      if (window.scrollY > scrollThreshold) {
        homeLogo.classList.add('scrolled');
        navLogo.classList.add('scrolled');
      } else {
        homeLogo.classList.remove('scrolled');
        navLogo.classList.remove('scrolled');
      }
    });
  </script>

  <script>
    // Get elements by their ID
    const shoppingLogo = document.getElementById('shopping-logo');
    const userLogo = document.getElementById('user-logo');
    const errorContainer = document.querySelector('.error-container');
    const closeButton = document.getElementById('error-close');

    // Function to show error container
    function showError() {
      errorContainer.style.display = 'block'; // Change display style to block to show it
    }

    // Function to hide error container
    function closeError() {
      errorContainer.style.display = 'none'; // Change display style to none to hide it
    }

    // Event listeners
    shoppingLogo.addEventListener('click', showError);
    userLogo.addEventListener('click', showError);
    closeButton.addEventListener('click', closeError);
  </script>
</body>
</html>
